<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--term-bg);padding:16px;font-family:var(--font-term);color:var(--term-fg);font-size:14px}
  .bar{background:var(--term-bar-bg);color:var(--term-bar-fg);font-weight:700;padding:2px 6px;margin-bottom:6px}
  table{width:100%;border-collapse:collapse}
  th{text-align:right;padding:2px 8px;font-weight:400;border-bottom:1px solid var(--term-fg);font-size:13px}
  th.left{text-align:left}
  td{padding:5px 8px}
  td.label{}
  td.colon{text-align:center;width:16px}
  td.num{text-align:right;border-bottom:1px dashed var(--term-fg-dimmer)}
  tr:hover td{background:var(--term-row-hover)}
  .foot{margin-top:10px;color:var(--term-fg-dim);font-size:12px}
  .dot{animation:blink 1s step-end infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
  <div class="bar">Anzeige Tagesinformation</div>
  <table>
    <thead><tr><th class="left">&nbsp;</th><th></th><th>Value</th><th>Order</th></tr></thead>
    <tbody>
      <tr><td class="label">Backorders (Plazos viejos)</td><td class="colon">:</td><td class="num">1.245.800,00</td><td class="num">142</td></tr>
      <tr><td class="label">Pedidos Abiertos (Futuros)</td><td class="colon">:</td><td class="num">8.420.110,00</td><td class="num">388</td></tr>
      <tr><td class="label">Venta diaria</td><td class="colon">:</td><td class="num">3.402.190,00</td><td class="num">57</td></tr>
    </tbody>
  </table>
  <div class="foot">Última actualización: 2026-05-28 14:32:07 | <span class="dot">●</span> LIVE</div>
</body>
</html>
