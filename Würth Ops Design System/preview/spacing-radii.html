<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 18px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .row{display:flex;gap:24px;align-items:flex-end}
  .item{text-align:center}
  .box{background:var(--blue-bg);border:1.5px solid var(--blue);width:80px;height:64px;margin:0 auto}
  .name{font-size:11px;font-weight:700;margin-top:8px}
  .val{font-size:10px;color:var(--text-3);font-family:var(--font-mono)}
</style>
</head>
<body>
  <p class="lead">Corner radii</p>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">card</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">control</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">pill</div><div class="val">20px</div></div>
    <div class="item"><div class="box" style="border-radius:0"></div><div class="name">terminal</div><div class="val">0</div></div>
  </div>
</body>
</html>
