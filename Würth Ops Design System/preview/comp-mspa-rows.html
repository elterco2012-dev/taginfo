<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:18px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 10px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .r{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
  .r:last-child{border-bottom:none}
  .l{font-size:12px;color:var(--text-2)}
  .v{font-size:14px;font-weight:700;color:var(--text);text-align:right}
  .hi .l{color:var(--amber)}.hi .v{color:var(--amber)}
  .venta .l{color:var(--green);font-weight:700}.venta .v{color:var(--green);font-size:17px}
</style>
</head>
<body>
  <p class="lead">MSPA — estado actual</p>
  <div class="r"><span class="l">Backorders (Plazos viejos)</span><span class="v">$1.245.800</span></div>
  <div class="r hi"><span class="l">Bloqueados por Límite Crédito</span><span class="v">$842.300</span></div>
  <div class="r"><span class="l">Producción Abierta</span><span class="v">$3.110.450</span></div>
  <div class="r venta"><span class="l">Venta del Día</span><span class="v">$3.402.190</span></div>
</body>
</html>
