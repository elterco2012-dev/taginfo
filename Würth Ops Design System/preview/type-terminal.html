<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--term-bg);padding:22px;font-family:var(--font-term);color:var(--term-fg)}
  .lead{font-size:11px;color:var(--term-fg-dim);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .bar{background:var(--term-bar-bg);color:var(--term-bar-fg);font-weight:700;padding:2px 6px;letter-spacing:1px;margin-bottom:8px;display:inline-block}
  .center{text-align:center;font-weight:700;letter-spacing:2px;font-size:17px;padding:6px 0}
  .rule{color:var(--term-fg);overflow:hidden;white-space:nowrap}
  .ann{font-size:10px;color:var(--term-fg-dim);margin-top:10px}
</style>
</head>
<body>
  <p class="lead">Terminal type · Courier New 16px</p>
  <div class="bar">taginfo2-1: 1.Anzeige 2.Taginfo EK 3.Taginfo Kunde</div>
  <div class="rule">==================================================</div>
  <div class="center">DAILY INFO 2 SALES</div>
  <div class="rule">==================================================</div>
  <div class="ann">Inverse title bar · ASCII rules · centered banner</div>
</body>
</html>
