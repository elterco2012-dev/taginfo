<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .row{margin-bottom:13px}
  .ann{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
</style>
</head>
<body>
  <p class="lead">Body &amp; supporting text</p>
  <div class="row"><div style="font-size:13px;color:var(--text)">Facturación acumulada del mes vs. plan</div><div class="ann">Body · 13px / 400</div></div>
  <div class="row"><div style="font-size:12px;color:var(--text-2)">Bloqueados por Límite Crédito</div><div class="ann">Small / table cell · 12px / 400 · text-2</div></div>
  <div class="row"><div style="font-size:11px;color:var(--text-3)">MSPA actualiza en 45s</div><div class="ann">Caption · 11px · text-3</div></div>
  <div class="row"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px">Pedidos / Vendedor</div><div class="ann">KPI label · 10px · uppercase</div></div>
</body>
</html>
