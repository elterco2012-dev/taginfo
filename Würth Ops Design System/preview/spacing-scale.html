<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .scale{display:flex;align-items:flex-end;gap:12px}
  .item{text-align:center}
  .bar{background:var(--wurth-red);width:22px;border-radius:3px}
  .val{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-top:6px}
</style>
</head>
<body>
  <p class="lead">Spacing scale (px)</p>
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px"></div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="height:6px"></div><div class="val">6</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="height:10px"></div><div class="val">10</div></div>
    <div class="item"><div class="bar" style="height:14px"></div><div class="val">14</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="val">20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="val">24</div></div>
  </div>
</body>
</html>
