<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:20px;color:var(--text)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--r-ctrl);overflow:hidden;border:1px solid var(--border)}
  .chip{height:56px}
  .meta{padding:7px 9px}
  .name{font-size:11px;font-weight:700}
  .hex{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 14px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
</style>
</head>
<body>
  <p class="lead">Neutrals · Slate ramp</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">bg</div><div class="hex">#f0f2f5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">surface</div><div class="hex">#ffffff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="meta"><div class="name">border</div><div class="hex">#e2e8f0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-3)"></div><div class="meta"><div class="name">text-3</div><div class="hex">#94a3b8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-2)"></div><div class="meta"><div class="name">text-2</div><div class="hex">#475569</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text)"></div><div class="meta"><div class="name">text</div><div class="hex">#0f172a</div></div></div>
  </div>
</body>
</html>
