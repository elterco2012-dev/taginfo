<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:20px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 14px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .grp{display:flex;gap:10px;margin-bottom:12px}
  .sw{flex:1;border:1px solid var(--border);border-radius:var(--r-ctrl);overflow:hidden}
  .chip{height:38px}
  .meta{padding:6px 8px}
  .name{font-size:10px;font-weight:700}
  .hex{font-size:9px;color:var(--text-3);font-family:var(--font-mono);margin-top:1px}
  .pills{display:flex;gap:8px}
  .pill{padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700}
</style>
</head>
<body>
  <p class="lead">Tinted backgrounds &amp; status pills</p>
  <div class="grp">
    <div class="sw"><div class="chip" style="background:var(--blue-bg)"></div><div class="meta"><div class="name">blue-bg</div><div class="hex">#eff6ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-bg)"></div><div class="meta"><div class="name">green-bg</div><div class="hex">#f0fdf4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-bg)"></div><div class="meta"><div class="name">amber-bg</div><div class="hex">#fffbeb</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-bg)"></div><div class="meta"><div class="name">red-bg</div><div class="hex">#fef2f2</div></div></div>
  </div>
  <div class="pills">
    <span class="pill" style="background:var(--pos-bg);color:var(--pos-fg)">▲ 12,4%</span>
    <span class="pill" style="background:var(--neg-bg);color:var(--neg-fg)">▼ 8,1%</span>
    <span class="pill" style="background:var(--flat-bg);color:var(--flat-fg)">Sin referencia</span>
  </div>
</body>
</html>
