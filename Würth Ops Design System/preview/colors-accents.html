<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:20px;color:var(--text)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--r-ctrl);overflow:hidden;border:1px solid var(--border)}
  .chip{height:50px}
  .meta{padding:7px 9px}
  .name{font-size:11px;font-weight:700}
  .role{font-size:9px;color:var(--text-3);margin-top:1px}
  .hex{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 14px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
</style>
</head>
<body>
  <p class="lead">Functional accents · semantic</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="meta"><div class="name">Blue</div><div class="role">informed</div><div class="hex">#2563eb</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="meta"><div class="name">Green</div><div class="role">facturado</div><div class="hex">#059669</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="meta"><div class="name">Amber</div><div class="role">retenido</div><div class="hex">#d97706</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="meta"><div class="name">Red</div><div class="role">anulado</div><div class="hex">#dc2626</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan)"></div><div class="meta"><div class="name">Cyan</div><div class="role">2nd KPI</div><div class="hex">#0891b2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange)"></div><div class="meta"><div class="name">Orange</div><div class="role">2nd KPI</div><div class="hex">#ea580c</div></div></div>
  </div>
</body>
</html>
