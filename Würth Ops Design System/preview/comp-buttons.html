<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;border:none}
  .primary{background:var(--wurth-red);color:#fff}
  .primary:hover{background:var(--wurth-red-hover)}
  .ghost{background:transparent;color:var(--text-2);border:1px solid var(--border-2);font-weight:600}
  .ghost:hover{background:var(--border);color:var(--text)}
  .clear{background:transparent;color:var(--text-3);border:1px solid var(--border);font-size:11px;font-weight:400;padding:6px 14px}
  .badge{background:#fff7f7;border:1.5px solid var(--wurth-red);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--wurth-red);font-weight:700}
</style>
</head>
<body>
  <p class="lead">Buttons &amp; date badge</p>
  <div class="row">
    <button class="btn primary">Ver fecha</button>
    <button class="btn ghost">🌙 Oscuro</button>
    <button class="btn clear">Volver al día actual</button>
    <span class="badge">28/05/2026 📅</span>
  </div>
</body>
</html>
