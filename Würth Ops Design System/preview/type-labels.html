<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .row{margin-bottom:16px}
  .ann{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-top:3px}
  .section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-3)}
  .h{font-size:14px;font-weight:700;color:var(--text)}
</style>
</head>
<body>
  <p class="lead">Section labels &amp; headers</p>
  <div class="row"><div class="section">FLUJO DEL DÍA — PEDIDOS INFORMADOS</div><div class="ann">Eyebrow · 9px / 700 · uppercase · 2px tracking</div></div>
  <div class="row"><div class="h">Operations Dashboard</div><div class="ann">Header / card title · 14px / 700</div></div>
  <div class="row"><div class="h" style="color:var(--wurth-red)">📊 Plan de Ventas</div><div class="ann">Branded section title · 14px / 700 · red</div></div>
</body>
</html>
