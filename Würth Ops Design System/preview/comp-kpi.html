<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#f0f2f5;padding:18px;color:var(--text)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
  .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .c-blue::after{background:var(--blue)}.c-green::after{background:var(--green)}
  .warn{border-color:var(--amber);background:var(--amber-bg)}.warn::after{background:var(--amber)}
  .lbl{font-size:10px;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .val{font-size:30px;font-weight:800;line-height:1}
  .c-blue .val{color:var(--blue)}.c-green .val{color:var(--green)}.warn .val{color:var(--amber)}
  .sub{font-size:10px;color:var(--text-3);margin-top:5px}
  .delta{display:inline-flex;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-top:6px;background:#dcfce7;color:#15803d}
</style>
</head>
<body>
  <div class="grid">
    <div class="kpi c-blue"><div class="lbl">Pedidos Informados</div><div class="val">1.284</div><div class="delta">▲ 12,4%</div></div>
    <div class="kpi c-green"><div class="lbl">Venta del Día</div><div class="val">$3,4M</div><div class="sub">vs. plan diario</div></div>
    <div class="kpi warn"><div class="lbl">Retenidos</div><div class="val">312</div><div class="sub">24,3% del informado</div></div>
  </div>
</body>
</html>
