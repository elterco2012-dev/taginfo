<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:22px;color:var(--text)}
  .lead{font-size:11px;color:var(--text-3);margin:0 0 16px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .specimen{display:flex;align-items:baseline;gap:16px;margin-bottom:14px}
  .num{font-weight:800;color:var(--blue);line-height:1}
  .ann{font-size:10px;color:var(--text-3);font-family:var(--font-mono)}
</style>
</head>
<body>
  <p class="lead">Display &amp; stat numbers</p>
  <div class="specimen"><div class="num" style="font-size:32px">1.284</div><div class="ann">Display · 32px / 800 — KPI hero</div></div>
  <div class="specimen"><div class="num" style="font-size:26px;color:var(--wurth-red)">$3,4M</div><div class="ann">Plan current · 26px / 800</div></div>
  <div class="specimen"><div class="num" style="font-size:22px;color:var(--green)">$1,2M</div><div class="ann">Stat · 22px / 800 — flow value</div></div>
</body>
</html>
